name: "Build Node.js Service"
description: "Install dependencies, lint, test, and build a Node.js project"

inputs:
  node-version:
    description: "Node.js version (e.g. 18, 20, 22)"
    required: false
    default: "20"
  package-manager:
    description: "Package manager: npm, yarn, or pnpm"
    required: false
    default: "npm"
  working-directory:
    description: "Path to the project root relative to repo root"
    required: false
    default: "."
  run-lint:
    description: "Whether to run linting (requires a lint script in package.json)"
    required: false
    default: "true"
  run-build:
    description: "Whether to run the build script (requires a build script in package.json)"
    required: false
    default: "true"
  test-command:
    description: "Override the default test command"
    required: false
    default: ""

outputs:
  build-output-path:
    description: "Path to compiled output directory (dist/, build/, etc.)"
    value: ${{ steps.detect-output.outputs.build-output-path }}

runs:
  using: composite
  steps:
    - name: Set up pnpm
      if: inputs.package-manager == 'pnpm'
      uses: pnpm/action-setup@v4
      with:
        version: latest

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.package-manager }}
        cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

    - name: Install dependencies (npm)
      if: inputs.package-manager == 'npm'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci

    - name: Install dependencies (yarn)
      if: inputs.package-manager == 'yarn'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: yarn install --frozen-lockfile

    - name: Install dependencies (pnpm)
      if: inputs.package-manager == 'pnpm'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install --frozen-lockfile

    - name: Lint
      if: inputs.run-lint == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.package-manager }} run lint --if-present

    - name: Run tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -n "${{ inputs.test-command }}" ]; then
          ${{ inputs.test-command }}
        else
          ${{ inputs.package-manager }} test -- --passWithNoTests 2>/dev/null || \
          ${{ inputs.package-manager }} test
        fi

    - name: Build
      if: inputs.run-build == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.package-manager }} run build --if-present

    - name: Detect build output path
      id: detect-output
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        for dir in dist build .next out; do
          if [ -d "$dir" ]; then
            echo "build-output-path=${{ inputs.working-directory }}/${dir}" >> $GITHUB_OUTPUT
            echo "✅ Detected build output: ${dir}"
            break
          fi
        done
