name: "Build Java Service"
description: "Compile, test, and package a Java project using Maven or Gradle"

inputs:
  java-version:
    description: "Java version to use (e.g. 17, 21)"
    required: false
    default: "21"
  build-tool:
    description: "Build tool to use: maven or gradle"
    required: false
    default: "maven"
  working-directory:
    description: "Path to the project root relative to repo root"
    required: false
    default: "."
  maven-args:
    description: "Additional Maven arguments"
    required: false
    default: ""
  gradle-args:
    description: "Additional Gradle arguments"
    required: false
    default: ""

outputs:
  artifact-path:
    description: "Path to the built JAR or WAR artifact"
    value: ${{ steps.build-maven.outputs.artifact-path || steps.build-gradle.outputs.artifact-path }}

runs:
  using: composite
  steps:
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: temurin
        cache: ${{ inputs.build-tool }}

    - name: Build with Maven
      if: inputs.build-tool == 'maven'
      id: build-maven
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        mvn --batch-mode --no-transfer-progress clean package ${{ inputs.maven-args }}
        ARTIFACT=$(find target -maxdepth 1 -name '*.jar' ! -name '*-sources.jar' | head -1)
        echo "artifact-path=${ARTIFACT}" >> $GITHUB_OUTPUT
        echo "✅ Built artifact: ${ARTIFACT}"

    - name: Build with Gradle
      if: inputs.build-tool == 'gradle'
      id: build-gradle
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        ./gradlew build ${{ inputs.gradle-args }}
        ARTIFACT=$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*-plain.jar' | head -1)
        echo "artifact-path=${ARTIFACT}" >> $GITHUB_OUTPUT
        echo "✅ Built artifact: ${ARTIFACT}"
