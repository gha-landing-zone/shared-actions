name: "Trigger Downstream Service"
description: "Fires a repository_dispatch event to a downstream repo to start its deploy pipeline"

inputs:
  downstream-repo:
    description: "Full org/repo-name of the downstream service to trigger"
    required: true
  event-type:
    description: "The repository_dispatch event type to fire. Downstream repos listen for this."
    required: false
    default: "upstream-deploy-complete"
  github-token:
    description: "A PAT or GitHub App token with repo dispatch permissions on the downstream repo"
    required: true
  upstream-service:
    description: "Name of the service that triggered this dispatch (included in payload)"
    required: false
    default: ${{ github.repository }}
  upstream-sha:
    description: "The commit SHA of the upstream deploy (included in payload)"
    required: false
    default: ${{ github.sha }}
  upstream-environment:
    description: "The environment the upstream service deploy to (included in payload)"
    required: false
    default: ""
  additional_payload:
    description: >
      Additional JSON key-value pairs to merge into the dispatch payload (must be valid JSON object string,
      e.g. {"key": "value"})
    required: false
    default: "{}"

runs:
  using: composite
  steps:
    - name: Dispatch event to downstream
      shell: bash
      run: |
        set -euo pipefail

        DOWNSTREAM="${{ inputs.downstream-repo }}"
        EVENT="${{ inputs.event-type }}"

        echo "🚀 Dispatching '${EVENT}' to ${DOWNSTREAM}..."

        # Build payload
        PAYLOAD=$(jq -n \
          --arg upstream "${{ inputs.upstream-service }}" \
          --arg sha "${{ inputs.upstream-sha }}" \
          --arg env "${{ inputs.upstream-environment }}" \
          --argjson extra '${{ inputs.additional-payload }}' \
          '{upstream_service: $upstream, upstream_sha: $sha, upstream_environment: $env} + $extra'
        )

        HTTP_STATUS=$(curl -s -o /tmp/dispatch_response.json -w "%{http_code}" \
          -X POST \
          -H "Authorization: token ${{ inputs.github-token }}" \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/${DOWNSTREAM}/dispatches" \
          -d "{\"event_type\": \"${EVENT}\", \"client_payload\": ${PAYLOAD}}")

        if [[ "$HTTP_STATUS" -eq 204 ]]; then
          echo "✅ Successfully dispatched '${EVENT}' to ${DOWNSTREAM}"
          echo "   Payload: ${PAYLOAD}"
        else
          echo "❌ Dispatch failed with HTTP status: ${HTTP_STATUS}"
          cat /tmp/dispatch_response.json
          exit 1
        fi
