name: Reusable Elixir Pipeline

on:
  workflow_call:
    inputs:
      service-name:
        description: "Name of the service (used for ECR repo, ECS service, and notifications)"
        required: true
        type: string
      elixir-version:
        required: false
        type: string
        default: "1.16"
      otp-version:
        required: false
        type: string
        default: "26"
      run-credo:
        required: false
        type: boolean
        default: true
      run-dialyzer:
        description: "Enable Dialyzer (slow — consider disabling on PRs)"
        required: false
        type: boolean
        default: false
      deploy-env:
        description: "Target deploy environment: staging or production"
        required: false
        type: string
        default: "staging"
      skip-deploy:
        description: "Set to true to run CI only without deploying"
        required: false
        type: boolean
        default: false
      # AWS / ECR
      aws-region:
        required: false
        type: string
        default: "us-west-2"
      ecr-repository:
        description: "ECR repository name. Defaults to service-name."
        required: false
        type: string
        default: ""
      # ECS
      ecs-cluster:
        description: "ECS cluster name or ARN"
        required: true
        type: string
      ecs-service:
        description: "ECS service name. Defaults to service-name."
        required: false
        type: string
        default: ""
      ecs-container-name:
        description: "Container name inside the task definition to update"
        required: false
        type: string
        default: "app"
      ecs-task-definition:
        description: "Path to the ECS task definition JSON int he repo"
        required: false
        type: string
        default: ".aws/task-definition.json"
    secrets:
      AWS_ROLE_ARN:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      ORG_DISPATCH_TOKEN:
        required: false
      TEAMS_WEBHOOK_URL:
        required: false

jobs:
  validate-tag:
    name: Validate Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gha-landing-zone/shared-actions/actions/enforce-tags@v1

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate-tag
    permissions:
      security-events: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: gha-landing-zone/shared-actions/actions/security-scan@v1
        with:
          language: ruby
          fail-on-severity: high

  build:
    name: Build & Test
    runs-on:
      group: build-runners
    needs: validate-tag
    steps:
      - uses: actions/checkout@v4
      - uses: gha-landing-zone/shared-actions/actions/build-elixir@v1
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
          run-credo: ${{ inputs.run-credo }}
          run-dialyzer: ${{ inputs.run-dialyzer }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service-name }}-release
          path: .
          retention-days: 7

  deploy:
    name: Deploy to ${{ inputs.deploy-env }}
    runs-on:
      group: deploy-runners
    needs: [security, build]
    if: |
      !inputs.skip-deploy &&
      (github.ref == 'refs/heads/main' || github.ref_type == 'tag') &&
      github.event_name != 'pull_request'
    environment: ${{ inputs.deploy-env }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: gha-landing-zone/shared-actions/actions/deploy-service@v1
        with:
          service-name: ${{ inputs.service-name }}
          environment: ${{ inputs.deploy-env }}
          aws-region: ${{ inputs.aws-region }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ecr-repository: ${{ inputs.ecr-repository }}
          ecs-cluster: ${{ inputs.ecs-cluster }}
          ecs-service: ${{ inputs.ecs-service }}
          ecs-container-name: ${{ inputs.ecs-container-name }}
          ecs-task-definition: ${{ inputs.ecs-task-definition }}
          image-tag: ${{ github.sha }}

      - name: Notify deploy result
        if: always()
        uses: gha-landing-zone/shared-actions/actions/notify-deploy@v1
        with:
          service-name: ${{ inputs.service-name }}
          environment: ${{ inputs.deploy-env }}
          status: ${{ job.status }}
          aws-region: ${{ inputs.aws-region }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
