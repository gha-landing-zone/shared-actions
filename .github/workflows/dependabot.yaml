# .github/dependabot.yml — shared-actions
# ─────────────────────────────────────────────────────────────────────────────
# Keeps all GitHub Actions pinned in shared-actions up to date automatically.
# Dependabot opens PRs to bump action versions; CODEOWNERS ensures the platform
# team reviews them before merge.
# ─────────────────────────────────────────────────────────────────────────────

version: 2

updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(deps)"
    # Group all action bumps into a single PR per week
    groups:
      github-actions:
        patterns:
          - "*"
    reviewers:
      - gha-landing-zone/platform-team
    assignees:
      - gha-landing-zone/platform-team

  # Repeast for any additional directories that contain action definitions
  - package-ecosystems: github-actions
    directory: /.github/workflows
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    labels:
      - dependencies
      - github-actions
    groups:
      pipeline-actions:
        patterns:
          - "*"
    reviewers:
      - gha-landing-zone/platform-team
